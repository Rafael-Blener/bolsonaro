#map { height: 100vh; width: 100%; z-index: 1; }

.dashboard {

    background: white; padding: 15px; border-radius: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.2); min-width: 180px; 
}

.search-container { 
    position: absolute; top: 15px; left: 60px; z-index: 1000; 
    display: flex; flex-direction: column; gap: 8px; 
}
.search-box { 
    background: white; padding: 8px; border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; gap: 5px; 
}
.search-box input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 180px; font-size: 13px; }
.search-box button { padding: 8px 12px; background: #1565C0; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

/* LEGENDA COMPACTA (Mesma linha) */
.legend { 
    position: absolute; bottom: 25px; left: 15px; z-index: 1000; 
    background: white; padding: 10px 12px; border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: auto; max-width: 220px; font-size: 10px; line-height: 1.6;
}
.legend-title { display: block; margin-bottom: 6px; font-size: 12px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 4px; }
.legend i { width: 10px; height: 10px; display: inline-block; margin-right: 6px; border-radius: 50%; vertical-align: baseline; border: 0.5px solid #999; }
.legend-item { white-space: nowrap; }

.progress-bar { background-color: #e0e0e0; border-radius: 10px; margin: 8px 0; height: 10px; width: 100%; overflow: hidden; }
.progress-fill { background-color: #1565C0; height: 100%; width: 49.6%; }
.highlight { color: #d32f2f; font-weight: bold; }
@media (max-width: 600px) { .legend { font-size: 9px; padding: 8px; } }

                l.bindPopup(`<div style="min-width:180px"><h3 style="margin:0 0 10px; color:#1565C0; font-size:16px;">${stats[n].c}</h3><b>Status:</b> ${stats[n].cat}<br><b>Votos:</b> ${stats[n].v.toLocaleString('pt-BR')}<br><hr style="border:0; border-top:1px solid #eee; margin:10px 0;"><b>Líder:</b> ${stats[n].l}<br><b>Dobra:</b> ${stats[n].d}<br><b>Tel:</b> ${stats[n].t}</div>`); 
            } 
        } 
    }).addTo(map); 
});
</script></body></html>
